<script>
const API_BASE = '/api';
let isLoggedIn = false;
let currentPage = 1;

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// LOGIN
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      isLoggedIn = true;
      localStorage.setItem('adminLogin', 'true');

      showToast('Login successful!', 'success');

      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboardContainer').style.display = 'block';

      fetchMessages();
    } else {
      showToast(data.message || 'Invalid login', 'error');
    }

  } catch (err) {
    showToast('Login failed', 'error');
  }
});

// LOGOUT
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('adminLogin');
  isLoggedIn = false;

  document.getElementById('loginContainer').style.display = 'flex';
  document.getElementById('dashboardContainer').style.display = 'none';
});

// FETCH MESSAGES
async function fetchMessages(page = 1) {
  try {
    const res = await fetch(`${API_BASE}/messages?page=${page}`);
    const data = await res.json();

    if (!data.messages) throw new Error("No data");

    renderStats(data.total, data.last30Days, data.today);
    renderMessages(data.messages);
    renderPagination(data.currentPage, data.totalPages);

  } catch (err) {
    console.error(err);
    showToast('Failed to load messages', 'error');
  }
}

// RENDER FUNCTIONS (UNCHANGED)
function renderStats(total, last30, today) {
  const statsDiv = document.getElementById('stats');
  statsDiv.innerHTML = `
    <div class="bg-blue-500/10 rounded-xl p-4 text-center">
      <p>Total</p><p>${total}</p>
    </div>
    <div class="bg-purple-500/10 rounded-xl p-4 text-center">
      <p>Last 30 Days</p><p>${last30}</p>
    </div>
    <div class="bg-green-500/10 rounded-xl p-4 text-center">
      <p>Today</p><p>${today}</p>
    </div>
  `;
  statsDiv.classList.remove('hidden');
}

function renderMessages(messages) {
  const tbody = document.getElementById('messagesTable');

  if (!messages.length) {
    tbody.innerHTML = `<tr><td colspan="4">No messages</td></tr>`;
    return;
  }

  tbody.innerHTML = messages.map(msg => `
    <tr>
      <td>${msg.fullname}</td>
      <td>${msg.email}</td>
      <td>${msg.message}</td>
      <td>${new Date(msg.createdAt).toLocaleString()}</td>
    </tr>
  `).join('');
}

function renderPagination(current, total) {
  const div = document.getElementById('pagination');
  let html = '';

  for (let i = 1; i <= total; i++) {
    html += `<button onclick="goToPage(${i})">${i}</button>`;
  }

  div.innerHTML = html;
}

window.goToPage = (page) => {
  fetchMessages(page);
};

// AUTO LOGIN
if (localStorage.getItem('adminLogin')) {
  isLoggedIn = true;
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('dashboardContainer').style.display = 'block';
  fetchMessages();
}
</script>
