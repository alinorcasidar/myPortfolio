<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Alinor Casidar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050810; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 25, 45, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .table-row:hover { background: rgba(59, 130, 246, 0.1); }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            backdrop-filter: blur(12px);
            border-left: 4px solid #3b82f6;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0a0f1a;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="p-6">
    <div id="toast" class="toast"></div>

    <!-- Login Container -->
    <div id="loginContainer" class="flex items-center justify-center min-h-screen">
        <div class="glass-card rounded-2xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Admin Login</h1>
                <p class="text-gray-400 mt-2">Access message dashboard</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-white/5 border border-white/15 rounded-xl p-3 text-white" required>
                <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-white/5 border border-white/15 rounded-xl p-3 text-white" required>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold text-white">Login</button>
            </form>
            <div class="mt-6 text-center text-sm text-gray-500">
                <a href="/" class="hover:text-blue-400 transition"><i class="fas fa-arrow-left mr-1"></i> Back to Portfolio</a>
            </div>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboardContainer" style="display: none;">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    <i class="fas fa-envelope mr-2"></i> Contact Messages
                </h1>
                <button id="logoutBtn" class="bg-red-600/20 hover:bg-red-600/40 text-red-300 px-4 py-2 rounded-xl transition">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <!-- Statistics -->
            <div id="stats" class="glass-card rounded-2xl p-6 mb-8 hidden grid grid-cols-1 md:grid-cols-4 gap-4"></div>

            <!-- Messages Table -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 border-b border-white/10">
                            <tr>
                                <th class="px-6 py-4 text-gray-300">Name</th>
                                <th class="px-6 py-4 text-gray-300">Email</th>
                                <th class="px-6 py-4 text-gray-300">Message</th>
                                <th class="px-6 py-4 text-gray-300">Date</th>
                            </tr>
                        </thead>
                        <tbody id="messagesTable"></tbody>
                    </table>
                </div>
                <div id="pagination" class="flex justify-center gap-2 py-4 border-t border-white/10"></div>
            </div>
        </div>
    </div>

    <!-- Modal for full message -->
    <div id="messageModal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white">Full Message</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <p id="fullMessageText" class="text-gray-300 whitespace-pre-wrap"></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = null;
        let currentPage = 1;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success && data.token) {
                    token = data.token;
                    localStorage.setItem('adminToken', token);
                    showToast('Login successful!', 'success');
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('dashboardContainer').style.display = 'block';
                    fetchMessages();
                    fetchVisitorCount();
                } else {
                    showToast(data.message || 'Invalid credentials', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Login failed', 'error');
            }
        });

        // LOGOUT
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            token = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
        });

        // FETCH VISITOR COUNT (only when logged in)
        async function fetchVisitorCount() {
            try {
                const res = await fetch(`${API_BASE}/visitors?noinc=true`); // we need to modify visitors API to accept noinc
                // But our current visitor API always increments. Let's adjust it: we'll create a separate endpoint for reading only.
                // For simplicity, we'll fetch the count from a read-only endpoint. We'll add a new endpoint later.
                // Alternatively, we can read from the same endpoint but with a query parameter.
                // Let's modify the visitors API to accept ?readonly=true.
            } catch (err) {
                console.error('Visitor count fetch error:', err);
            }
        }

        // FETCH MESSAGES
        async function fetchMessages(page = 1) {
            if (!token) {
                token = localStorage.getItem('adminToken');
                if (!token) return;
            }
            try {
                const res = await fetch(`${API_BASE}/messages?page=${page}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem('adminToken');
                    token = null;
                    document.getElementById('loginContainer').style.display = 'flex';
                    document.getElementById('dashboardContainer').style.display = 'none';
                    showToast('Session expired, please login again', 'error');
                    return;
                }
                const data = await res.json();
                renderStats(data.total, data.last30Days, data.today, data.visitorCount);
                renderMessages(data.messages);
                renderPagination(data.currentPage, data.totalPages);
            } catch (err) {
                console.error(err);
                showToast('Failed to load messages', 'error');
            }
        }

        function renderStats(total, last30, today, visitorCount = 0) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="bg-blue-500/10 rounded-xl p-4 text-center">
                    <i class="fas fa-inbox text-2xl text-blue-400 mb-2"></i>
                    <p class="text-gray-300">Total Messages</p>
                    <p class="text-3xl font-bold text-white">${total}</p>
                </div>
                <div class="bg-purple-500/10 rounded-xl p-4 text-center">
                    <i class="fas fa-clock text-2xl text-purple-400 mb-2"></i>
                    <p class="text-gray-300">Last 30 Days</p>
                    <p class="text-3xl font-bold text-white">${last30}</p>
                </div>
                <div class="bg-green-500/10 rounded-xl p-4 text-center">
                    <i class="fas fa-calendar-day text-2xl text-green-400 mb-2"></i>
                    <p class="text-gray-300">Today</p>
                    <p class="text-3xl font-bold text-white">${today}</p>
                </div>
                <div class="bg-yellow-500/10 rounded-xl p-4 text-center">
                    <i class="fas fa-eye text-2xl text-yellow-400 mb-2"></i>
                    <p class="text-gray-300">Total Visitors</p>
                    <p class="text-3xl font-bold text-white">${visitorCount}</p>
                </div>
            `;
            statsDiv.classList.remove('hidden');
        }

        function renderMessages(messages) {
            const tbody = document.getElementById('messagesTable');
            if (!messages.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">No messages found.</td></tr>';
                return;
            }
            tbody.innerHTML = messages.map(msg => `
                <tr class="table-row border-b border-white/5 hover:bg-white/5 transition">
                    <td class="px-6 py-4 font-medium text-white">${escapeHtml(msg.fullname)}</td>
                    <td class="px-6 py-4 text-gray-300">
                        <a href="mailto:${escapeHtml(msg.email)}" class="text-blue-400 hover:underline">${escapeHtml(msg.email)}</a>
                    </td>
                    <td class="px-6 py-4 text-gray-300 max-w-md">
                        <div class="truncate">${escapeHtml(msg.message)}</div>
                        ${msg.message.length > 100 ? `<button onclick="showFullMessage('${escapeHtml(msg.message).replace(/'/g, "\\'")}')" class="text-xs text-blue-400 mt-1">Read more</button>` : ''}
                    </td>
                    <td class="px-6 py-4 text-gray-400 text-sm">${new Date(msg.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function renderPagination(current, total) {
            const div = document.getElementById('pagination');
            if (total <= 1) {
                div.innerHTML = '';
                return;
            }
            let html = '';
            for (let i = 1; i <= total; i++) {
                html += `<button onclick="goToPage(${i})" class="px-3 py-1 rounded-lg ${current === i ? 'bg-blue-600 text-white' : 'bg-white/10 text-gray-300 hover:bg-white/20'}">${i}</button>`;
            }
            div.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.goToPage = (page) => {
            currentPage = page;
            fetchMessages(page);
        };

        window.showFullMessage = (msg) => {
            const modal = document.getElementById('messageModal');
            document.getElementById('fullMessageText').innerText = msg;
            modal.classList.remove('hidden');
        };

        function closeModal() {
            document.getElementById('messageModal').classList.add('hidden');
        }

        // Auto-login if token exists
        const storedToken = localStorage.getItem('adminToken');
        if (storedToken) {
            token = storedToken;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            fetchMessages();
        }
    </script>
</body>
</html>
