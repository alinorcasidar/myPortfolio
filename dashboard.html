<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050810] text-white p-6">

<h1 class="text-3xl font-bold mb-6">📩 Messages Dashboard</h1>

<div class="overflow-x-auto">
<table class="w-full border border-white/10 rounded-xl overflow-hidden">
    <thead class="bg-white/10">
        <tr>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Email</th>
            <th class="p-3 text-left">Message</th>
            <th class="p-3 text-left">Date</th>
        </tr>
    </thead>
    <tbody id="messageTable"></tbody>
</table>
</div>

<script>
async function loadMessages() {
    try {
        const res = await fetch('/api/messages');
        const data = await res.json();

        const table = document.getElementById('messageTable');
        table.innerHTML = '';

        if (!data.success || data.messages.length === 0) {
            table.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">No messages</td></tr>`;
            return;
        }

        data.messages.forEach(msg => {
            const row = `
                <tr class="border-t border-white/10 hover:bg-white/5">
                    <td class="p-3">${msg.fullname || msg.name}</td>
                    <td class="p-3">${msg.email}</td>
                    <td class="p-3">${msg.message}</td>
                    <td class="p-3">${new Date(msg.createdAt).toLocaleString()}</td>
                </tr>
            `;
            table.innerHTML += row;
        });

    } catch (err) {
        console.error(err);
    }
}

loadMessages();
</script>

</body>
</html>
